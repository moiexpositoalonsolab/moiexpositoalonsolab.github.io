<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1714; --green:#14583F; --green-mid:#1F8A5B; --green-bright:#4FC587;
    --muted1:#41514A; --muted2:#56655D; --muted3:#7A867E; --mono-grey:#8A968E; --faint:#A6B0A8;
    --bg-soft:#F6F8F7; --bg-soft2:#EEF2EF; --pill:#EEF5F0;
    --line:#E8EBE9; --line2:#E2E6E3; --line3:#D2D9D4; --line-green:#CFE7DA;
    --dark:#0C1512;
    --serif:'Newsreader', serif; --sans:'Hanken Grotesk', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#fff;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:#BBE9CF;color:var(--dark)}
  a{color:inherit}
  em,i{font-family:var(--serif);font-style:italic}
  .wrap{max-width:1240px;margin:0 auto;padding-left:32px;padding-right:32px}
  .eyebrow{font-family:var(--mono);font-size:12.5px;letter-spacing:.13em;color:var(--green-mid);text-transform:uppercase}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;margin:0}
  .readlink{font-size:14px;font-weight:600;color:var(--green)}
  header.gnav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  nav.bar{display:flex;align-items:center;justify-content:space-between;gap:24px;padding-top:16px;padding-bottom:16px}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;white-space:nowrap;text-decoration:none}
  .brand span{font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--ink)}
  .navlinks{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .navlink{position:relative;padding:8px 14px;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted1);white-space:nowrap;background:none;border:0;font-family:inherit;text-decoration:none}
  .navlink:hover{color:var(--green)}
  .navlink .ind{position:absolute;left:14px;right:14px;bottom:0;height:2px;background:var(--green);border-radius:2px;display:none}
  .navlink.active{color:var(--green)}
  .navlink.active .ind{display:block}
  .navcta{background:var(--green);color:#fff;padding:9px 17px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border:0;font-family:inherit;text-decoration:none}
  .navcta:hover{background:var(--dark)}
  .soft{background:var(--bg-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .card{border:1px solid var(--line);border-radius:14px;padding:28px;background:#fff;transition:border-color .2s;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px}
  a.card:hover{border-color:var(--green)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:900px){ .grid3,.grid2{grid-template-columns:1fr !important} .navlinks{display:none} }
  /* prose for content pages */
  .prose{max-width:760px;margin:0 auto;font-size:17px;line-height:1.7;color:var(--muted1)}
  .prose h1{font-size:clamp(34px,5vw,56px);line-height:1.05;color:var(--ink);margin:0 0 8px}
  .prose h2{font-size:clamp(26px,3vw,36px);line-height:1.1;color:var(--ink);margin:48px 0 14px}
  .prose h3{font-size:23px;color:var(--ink);margin:34px 0 10px}
  .prose p{margin:0 0 20px}
  .prose a{color:var(--green);text-decoration:underline;text-underline-offset:2px}
  .prose img{max-width:100%;height:auto;border-radius:12px;border:1px solid var(--line);display:block;margin:24px auto}
  .prose ul,.prose ol{padding-left:22px;margin:0 0 20px}
  .prose li{margin:0 0 8px}
  .prose table{border-collapse:collapse;width:100%;margin:24px 0;font-size:15px}
  .prose th,.prose td{border:1px solid var(--line);padding:10px 12px;text-align:left}
  .prose th{background:var(--bg-soft);font-family:var(--sans);font-weight:600}
  .prose blockquote{border-left:3px solid var(--line-green);margin:24px 0;padding:4px 0 4px 18px;color:var(--muted2)}
  .prose code{font-family:var(--mono);font-size:14px;background:var(--bg-soft);padding:2px 6px;border-radius:5px}
  .prose hr{border:0;border-top:1px solid var(--line);margin:36px 0}
  footer.gfoot{background:var(--dark);color:rgba(244,247,245,.74);margin-top:80px}
  footer.gfoot a{color:inherit;text-decoration:none}
  footer.gfoot a:hover,footer.gfoot span:hover{color:var(--green-bright)}
</style>
